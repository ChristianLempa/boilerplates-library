services:
  << (service_name | default('homepage', true)) >>:
    image: ghcr.io/gethomepage/homepage:v1.12.3
    restart: << restart_policy >>
    <%- if container_name %>
    container_name: << container_name >>
    <%- endif %>
    environment:
      <%- if traefik_enabled %>
      - HOMEPAGE_ALLOWED_HOSTS=<< traefik_host >>.<< traefik_domain >>
      <%- else %>
      - HOMEPAGE_ALLOWED_HOSTS=localhost:<< ports_http >>,127.0.0.1:<< ports_http >>
      <%- endif %>
      <%- if container_timezone %>
      - TZ=<< container_timezone >>
      <%- endif %>
      <%- if container_loglevel %>
      - LOG_LEVEL=<< container_loglevel >>
      <%- endif %>
    <%- if traefik_enabled %>
    networks:
      << traefik_network >>:
    <%- endif %>
    <%- if not traefik_enabled %>
    ports:
      - << ports_http >>:3000
    <%- endif %>
    volumes:
      <%- if volume_mode == 'local' %>
      - << ((volume_config_name | default('', true) | string | trim) if ((volume_config_name | default('', true) | string | trim) and ((volume_config_name | default('', true) | string | trim) | lower) not in ['true', 'false', 'none', 'null']) else ((service_name | default('homepage', true)) ~ "_config")) >>:/app/config
      - << ((volume_images_name | default('', true) | string | trim) if ((volume_images_name | default('', true) | string | trim) and ((volume_images_name | default('', true) | string | trim) | lower) not in ['true', 'false', 'none', 'null']) else ((service_name | default('homepage', true)) ~ "_images")) >>:/app/images
      - << ((volume_icons_name | default('', true) | string | trim) if ((volume_icons_name | default('', true) | string | trim) and ((volume_icons_name | default('', true) | string | trim) | lower) not in ['true', 'false', 'none', 'null']) else ((service_name | default('homepage', true)) ~ "_icons")) >>:/app/icons
      <%- elif volume_mode == 'mount' %>
      - << volume_mount_path >>/<< (service_name | default('homepage', true)) >>/config:/app/config
      - << volume_mount_path >>/<< (service_name | default('homepage', true)) >>/images:/app/images
      - << volume_mount_path >>/<< (service_name | default('homepage', true)) >>/icons:/app/icons
      <%- elif volume_mode == 'nfs' %>
      - << ((volume_config_name | default('', true) | string | trim) if ((volume_config_name | default('', true) | string | trim) and ((volume_config_name | default('', true) | string | trim) | lower) not in ['true', 'false', 'none', 'null']) else ((service_name | default('homepage', true)) ~ "_config")) >>:/app/config
      - << ((volume_images_name | default('', true) | string | trim) if ((volume_images_name | default('', true) | string | trim) and ((volume_images_name | default('', true) | string | trim) | lower) not in ['true', 'false', 'none', 'null']) else ((service_name | default('homepage', true)) ~ "_images")) >>:/app/images
      - << ((volume_icons_name | default('', true) | string | trim) if ((volume_icons_name | default('', true) | string | trim) and ((volume_icons_name | default('', true) | string | trim) | lower) not in ['true', 'false', 'none', 'null']) else ((service_name | default('homepage', true)) ~ "_icons")) >>:/app/icons
      <%- endif %>
    <%- if traefik_enabled %>
    labels:
      - traefik.enable=true
      - traefik.docker.network=<< traefik_network >>
      - traefik.http.services.<< (service_name | default('homepage', true)) >>-web.loadbalancer.server.port=3000
      - traefik.http.routers.<< (service_name | default('homepage', true)) >>-http.service=<< (service_name | default('homepage', true)) >>-web
      - traefik.http.routers.<< (service_name | default('homepage', true)) >>-http.rule=Host(`<< traefik_host >>.<< traefik_domain >>`)
      - traefik.http.routers.<< (service_name | default('homepage', true)) >>-http.entrypoints=<< traefik_entrypoint >>
      <%- if traefik_tls_enabled %>
      - traefik.http.routers.<< (service_name | default('homepage', true)) >>-https.service=<< (service_name | default('homepage', true)) >>-web
      - traefik.http.routers.<< (service_name | default('homepage', true)) >>-https.rule=Host(`<< traefik_host >>.<< traefik_domain >>`)
      - traefik.http.routers.<< (service_name | default('homepage', true)) >>-https.entrypoints=<< traefik_tls_entrypoint >>
      - traefik.http.routers.<< (service_name | default('homepage', true)) >>-https.tls=true
      - traefik.http.routers.<< (service_name | default('homepage', true)) >>-https.tls.certresolver=<< traefik_tls_certresolver >>
      <%- endif %>
    <%- endif %>

<%- if traefik_enabled %>
networks:
  << traefik_network >>:
    external: true
<%- endif %>

<%- if volume_mode == 'local' %>
volumes:
  << ((volume_config_name | default('', true) | string | trim) if ((volume_config_name | default('', true) | string | trim) and ((volume_config_name | default('', true) | string | trim) | lower) not in ['true', 'false', 'none', 'null']) else ((service_name | default('homepage', true)) ~ "_config")) >>:
  << ((volume_images_name | default('', true) | string | trim) if ((volume_images_name | default('', true) | string | trim) and ((volume_images_name | default('', true) | string | trim) | lower) not in ['true', 'false', 'none', 'null']) else ((service_name | default('homepage', true)) ~ "_images")) >>:
  << ((volume_icons_name | default('', true) | string | trim) if ((volume_icons_name | default('', true) | string | trim) and ((volume_icons_name | default('', true) | string | trim) | lower) not in ['true', 'false', 'none', 'null']) else ((service_name | default('homepage', true)) ~ "_icons")) >>:
<%- elif volume_mode == 'nfs' %>
volumes:
  << ((volume_config_name | default('', true) | string | trim) if ((volume_config_name | default('', true) | string | trim) and ((volume_config_name | default('', true) | string | trim) | lower) not in ['true', 'false', 'none', 'null']) else ((service_name | default('homepage', true)) ~ "_config")) >>:
    driver: local
    driver_opts:
      type: nfs
      o: addr=<< volume_nfs_server >>,<< volume_nfs_options >>
      device: ":<< volume_nfs_path >>/config"
  << ((volume_images_name | default('', true) | string | trim) if ((volume_images_name | default('', true) | string | trim) and ((volume_images_name | default('', true) | string | trim) | lower) not in ['true', 'false', 'none', 'null']) else ((service_name | default('homepage', true)) ~ "_images")) >>:
    driver: local
    driver_opts:
      type: nfs
      o: addr=<< volume_nfs_server >>,<< volume_nfs_options >>
      device: ":<< volume_nfs_path >>/images"
  << ((volume_icons_name | default('', true) | string | trim) if ((volume_icons_name | default('', true) | string | trim) and ((volume_icons_name | default('', true) | string | trim) | lower) not in ['true', 'false', 'none', 'null']) else ((service_name | default('homepage', true)) ~ "_icons")) >>:
    driver: local
    driver_opts:
      type: nfs
      o: addr=<< volume_nfs_server >>,<< volume_nfs_options >>
      device: ":<< volume_nfs_path >>/icons"
<%- endif %>
