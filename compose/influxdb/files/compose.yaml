---
services:
  << (service_name | default('influxdb', true)) >>:
    image: docker.io/library/influxdb:2.8.0-alpine
    restart: << restart_policy >>
    environment:
      - TZ=<< container_timezone >>
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_INIT_USERNAME}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_INIT_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_INIT_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_INIT_BUCKET}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_INIT_ADMIN_TOKEN}
    <%- if traefik_enabled %>
    networks:
      << traefik_network >>:
    <%- endif %>
    <%- if not traefik_enabled %>
    ports:
      - "<< ports_http >>:8086"
    <%- endif %>
    volumes:
      - << ((volume_data_name | default('', true) | string | trim) if ((volume_data_name | default('', true) | string | trim) and ((volume_data_name | default('', true) | string | trim) | lower) not in ['true', 'false', 'none', 'null']) else ((service_name | default('influxdb', true)) ~ "_data")) >>:/var/lib/influxdb2
      - << ((volume_config_name | default('', true) | string | trim) if ((volume_config_name | default('', true) | string | trim) and ((volume_config_name | default('', true) | string | trim) | lower) not in ['true', 'false', 'none', 'null']) else ((service_name | default('influxdb', true)) ~ "_config")) >>:/etc/influxdb2
    <%- if traefik_enabled %>
    labels:
      - traefik.enable=true
      - traefik.docker.network=<< traefik_network >>
      - traefik.http.services.<< (service_name | default('influxdb', true)) >>-web.loadbalancer.server.port=8086
      - traefik.http.services.<< (service_name | default('influxdb', true)) >>-web.loadbalancer.server.scheme=http
      - traefik.http.routers.<< (service_name | default('influxdb', true)) >>-web-http.rule=Host(`<< traefik_host >>.<< traefik_domain >>`)
      - traefik.http.routers.<< (service_name | default('influxdb', true)) >>-web-http.entrypoints=<< traefik_entrypoint >>
      - traefik.http.routers.<< (service_name | default('influxdb', true)) >>-web-http.service=<< (service_name | default('influxdb', true)) >>-web
      <%- if traefik_tls_enabled %>
      - traefik.http.routers.<< (service_name | default('influxdb', true)) >>-web-https.rule=Host(`<< traefik_host >>.<< traefik_domain >>`)
      - traefik.http.routers.<< (service_name | default('influxdb', true)) >>-web-https.entrypoints=<< traefik_tls_entrypoint >>
      - traefik.http.routers.<< (service_name | default('influxdb', true)) >>-web-https.tls=true
      - traefik.http.routers.<< (service_name | default('influxdb', true)) >>-web-https.tls.certresolver=<< traefik_tls_certresolver >>
      - traefik.http.routers.<< (service_name | default('influxdb', true)) >>-web-https.service=<< (service_name | default('influxdb', true)) >>-web
      <%- endif %>
    <%- endif %>
    
volumes:
  << ((volume_data_name | default('', true) | string | trim) if ((volume_data_name | default('', true) | string | trim) and ((volume_data_name | default('', true) | string | trim) | lower) not in ['true', 'false', 'none', 'null']) else ((service_name | default('influxdb', true)) ~ "_data")) >>:
    driver: local
  << ((volume_config_name | default('', true) | string | trim) if ((volume_config_name | default('', true) | string | trim) and ((volume_config_name | default('', true) | string | trim) | lower) not in ['true', 'false', 'none', 'null']) else ((service_name | default('influxdb', true)) ~ "_config")) >>:
    driver: local

<%- if traefik_enabled %>
networks:
  << traefik_network >>:
    external: true
<%- endif %>
