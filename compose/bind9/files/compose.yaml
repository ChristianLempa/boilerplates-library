services:
  << (service_name | default('bind9', true)) >>:
    image: docker.io/ubuntu/bind9:9.20-24.10_edge
    restart: << restart_policy >>
    <%- if container_hostname %>
    hostname: << container_hostname >>
    <%- endif %>
    environment:
      - TZ=<< container_timezone >>
      - BIND9_USER=bind
    <%- if network_mode == 'host' %>
    network_mode: host
    <%- elif network_mode == 'bridge' or network_mode == 'macvlan' %>
    networks:
      <%- if network_mode == 'macvlan' %>
      << network_name >>:
        ipv4_address: << network_macvlan_ipv4_address >>
      <%- elif network_mode == 'bridge' %>
      << network_name >>:
      <%- endif %>
    <%- endif %>
    <%- if network_mode == '' or network_mode == 'bridge' %>
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    <%- endif %>
    volumes:
      <%- if volume_mode == 'mount' %>
      - << volume_mount_path >>/config:/etc/bind:rw
      - << volume_mount_path >>/zones:/var/lib/bind:rw
      - << volume_mount_path >>/cache:/var/cache/bind:rw
      <%- else %>
      - << ((volume_config_name | default('', true) | string | trim) if ((volume_config_name | default('', true) | string | trim) and ((volume_config_name | default('', true) | string | trim) | lower) not in ['true', 'false', 'none', 'null']) else ((service_name | default('bind9', true)) ~ "_config")) >>:/etc/bind
      - << ((volume_zones_name | default('', true) | string | trim) if ((volume_zones_name | default('', true) | string | trim) and ((volume_zones_name | default('', true) | string | trim) | lower) not in ['true', 'false', 'none', 'null']) else ((service_name | default('bind9', true)) ~ "_zones")) >>:/var/lib/bind
      - << ((volume_cache_name | default('', true) | string | trim) if ((volume_cache_name | default('', true) | string | trim) and ((volume_cache_name | default('', true) | string | trim) | lower) not in ['true', 'false', 'none', 'null']) else ((service_name | default('bind9', true)) ~ "_cache")) >>:/var/cache/bind
      <%- endif %>

<%- if network_mode == 'bridge' or network_mode == 'macvlan' %>
networks:
  << network_name >>:
    <%- if network_external %>
    external: true
    <%- else %>
    <%- if network_mode == 'macvlan' %>
    driver: macvlan
    driver_opts:
      parent: << network_macvlan_parent_interface >>
    ipam:
      config:
        - subnet: << network_macvlan_subnet >>
          gateway: << network_macvlan_gateway >>
    name: << network_name >>
    <%- elif network_mode == 'bridge' %>
    driver: bridge
    <%- endif %>
  <%- endif %>
<%- endif %>

<%- if volume_mode == 'local' %>
volumes:
  << ((volume_config_name | default('', true) | string | trim) if ((volume_config_name | default('', true) | string | trim) and ((volume_config_name | default('', true) | string | trim) | lower) not in ['true', 'false', 'none', 'null']) else ((service_name | default('bind9', true)) ~ "_config")) >>:
    driver: local
  << ((volume_zones_name | default('', true) | string | trim) if ((volume_zones_name | default('', true) | string | trim) and ((volume_zones_name | default('', true) | string | trim) | lower) not in ['true', 'false', 'none', 'null']) else ((service_name | default('bind9', true)) ~ "_zones")) >>:
    driver: local
  << ((volume_cache_name | default('', true) | string | trim) if ((volume_cache_name | default('', true) | string | trim) and ((volume_cache_name | default('', true) | string | trim) | lower) not in ['true', 'false', 'none', 'null']) else ((service_name | default('bind9', true)) ~ "_cache")) >>:
    driver: local
<%- elif volume_mode == 'nfs' %>
volumes:
  << ((volume_config_name | default('', true) | string | trim) if ((volume_config_name | default('', true) | string | trim) and ((volume_config_name | default('', true) | string | trim) | lower) not in ['true', 'false', 'none', 'null']) else ((service_name | default('bind9', true)) ~ "_config")) >>:
    driver: local
    driver_opts:
      type: nfs
      o: addr=<< volume_nfs_server >>,<< volume_nfs_options >>
      device: ":<< volume_nfs_path >>/config"
  << ((volume_zones_name | default('', true) | string | trim) if ((volume_zones_name | default('', true) | string | trim) and ((volume_zones_name | default('', true) | string | trim) | lower) not in ['true', 'false', 'none', 'null']) else ((service_name | default('bind9', true)) ~ "_zones")) >>:
    driver: local
    driver_opts:
      type: nfs
      o: addr=<< volume_nfs_server >>,<< volume_nfs_options >>
      device: ":<< volume_nfs_path >>/zones"
  << ((volume_cache_name | default('', true) | string | trim) if ((volume_cache_name | default('', true) | string | trim) and ((volume_cache_name | default('', true) | string | trim) | lower) not in ['true', 'false', 'none', 'null']) else ((service_name | default('bind9', true)) ~ "_cache")) >>:
    driver: local
    driver_opts:
      type: nfs
      o: addr=<< volume_nfs_server >>,<< volume_nfs_options >>
      device: ":<< volume_nfs_path >>/cache"
<%- endif %>
