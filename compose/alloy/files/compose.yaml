services:
  << (service_name | default('alloy', true)) >>:
    image: docker.io/grafana/alloy:v1.16.0
    restart: << restart_policy >>
    <%- if container_hostname %>
    hostname: << container_hostname >>
    <%- endif %>
    <%- if traefik_enabled %>
    networks:
      << traefik_network >>:
    <%- endif %>
    command:
      - run
      - /etc/alloy/alloy.d/
      - --server.http.listen-addr=127.0.0.1:12345
    <%- if not traefik_enabled %>
    ports:
      - "<< ports_webui >>:12345"
    <%- endif %>
    volumes:
      - << ((volume_data_name | default('', true) | string | trim) if ((volume_data_name | default('', true) | string | trim) and ((volume_data_name | default('', true) | string | trim) | lower) not in ['true', 'false', 'none', 'null']) else ((service_name | default('alloy', true)) ~ "_data")) >>:/alloy/data
      - ./config:/etc/alloy/alloy.d/:ro
      <%- if logs_enabled or metrics_enabled %>
      - /:/rootfs:ro
      - /sys:/sys:ro
      <%- endif %>
      <%- if logs_enabled and logs_system %>
      - /run:/run:ro
      - /var/log:/var/log:ro
      <%- endif %>
      <%- if (logs_enabled and logs_docker) or (metrics_enabled and metrics_docker) %>
      - /var/lib/docker/:/var/lib/docker/:ro
      <%- endif %>
      <%- if metrics_enabled and metrics_system %>
      - /run/udev/data:/run/udev/data:ro
      <%- endif %>
    <%- if traefik_enabled %>
    labels:
      - traefik.enable=true
      - traefik.docker.network=<< traefik_network >>
      - traefik.http.services.<< (service_name | default('alloy', true)) >>-web.loadBalancer.server.port=12345
      - traefik.http.routers.<< (service_name | default('alloy', true)) >>-http.service=<< (service_name | default('alloy', true)) >>-web
      - traefik.http.routers.<< (service_name | default('alloy', true)) >>-http.rule=Host(`<< traefik_host >>.<< traefik_domain >>`)
      - traefik.http.routers.<< (service_name | default('alloy', true)) >>-http.entrypoints=<< traefik_entrypoint >>
      <%- if traefik_tls_enabled %>
      - traefik.http.routers.<< (service_name | default('alloy', true)) >>-https.service=<< (service_name | default('alloy', true)) >>-web
      - traefik.http.routers.<< (service_name | default('alloy', true)) >>-https.rule=Host(`<< traefik_host >>.<< traefik_domain >>`)
      - traefik.http.routers.<< (service_name | default('alloy', true)) >>-https.entrypoints=<< traefik_tls_entrypoint >>
      - traefik.http.routers.<< (service_name | default('alloy', true)) >>-https.tls=true
      - traefik.http.routers.<< (service_name | default('alloy', true)) >>-https.tls.certresolver=<< traefik_tls_certresolver >>
      <%- endif %>
    <%- endif %>

<%- if traefik_enabled %>
networks:
  << traefik_network >>:
    external: true
<%- endif %>

volumes:
  << ((volume_data_name | default('', true) | string | trim) if ((volume_data_name | default('', true) | string | trim) and ((volume_data_name | default('', true) | string | trim) | lower) not in ['true', 'false', 'none', 'null']) else ((service_name | default('alloy', true)) ~ "_data")) >>:
    driver: local
