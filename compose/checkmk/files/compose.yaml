---
services:
  << (service_name | default('checkmk', true)) >>:
    image: checkmk/check-mk-community:2.5.0-latest
    restart: << restart_policy >>
    environment:
      <%- if container_timezone %>
      - TZ=<< container_timezone >>
      <%- endif %>
      - CMK_PASSWORD=${CMK_PASSWORD}
      - CMK_SITE_ID=<< cmk_site_id >>
    tmpfs:
      - /opt/omd/sites/<< cmk_site_id >>/tmp:uid=<< user_uid >>,gid=<< user_gid >>
    volumes:
      <%- if not container_timezone %>
      - /etc/localtime:/etc/localtime:ro
      <%- endif %>
      - << volume_data_name or ((service_name | default('checkmk', true)) ~ "_data") >>:/omd/sites:rw
    <%- if traefik_enabled %>
    networks:
      << traefik_network >>:
    <%- endif %>
    ports:
    <%- if not traefik_enabled %>
      - "<< ports_http >>:5000"
    <%- endif %>
      - "<< ports_agent >>:8000"
      - "<< ports_snmp >>:162/udp"
    <%- if traefik_enabled %>
    labels:
      - traefik.enable=true
      - traefik.docker.network=<< traefik_network >>
      - traefik.http.services.<< (service_name | default('checkmk', true)) >>-web.loadBalancer.server.port=5000
      - traefik.http.services.<< (service_name | default('checkmk', true)) >>-web.loadBalancer.server.scheme=http
      - traefik.http.routers.<< (service_name | default('checkmk', true)) >>-http.service=<< (service_name | default('checkmk', true)) >>-web
      - traefik.http.routers.<< (service_name | default('checkmk', true)) >>-http.rule=Host(`<< traefik_host >>.<< traefik_domain >>`)
      - traefik.http.routers.<< (service_name | default('checkmk', true)) >>-http.entrypoints=<< traefik_entrypoint >>
      <%- if traefik_tls_enabled %>
      - traefik.http.routers.<< (service_name | default('checkmk', true)) >>-https.service=<< (service_name | default('checkmk', true)) >>-web
      - traefik.http.routers.<< (service_name | default('checkmk', true)) >>-https.rule=Host(`<< traefik_host >>.<< traefik_domain >>`)
      - traefik.http.routers.<< (service_name | default('checkmk', true)) >>-https.entrypoints=<< traefik_tls_entrypoint >>
      - traefik.http.routers.<< (service_name | default('checkmk', true)) >>-https.tls=true
      - traefik.http.routers.<< (service_name | default('checkmk', true)) >>-https.tls.certresolver=<< traefik_tls_certresolver >>
      <%- endif %>
    <%- endif %>

volumes:
  << volume_data_name or ((service_name | default('checkmk', true)) ~ "_data") >>:
    driver: local

<%- if traefik_enabled %>
networks:
  << traefik_network >>:
    external: true
<%- endif %>
