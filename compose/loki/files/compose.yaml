---
services:
  << (service_name | default('loki', true)) >>:
    image: docker.io/grafana/loki:3.7.1
    restart: << restart_policy >>
    command: "-config.file=/etc/loki/config.yaml"
    <%- if not traefik_enabled %>
    ports:
      - "<< ports_http >>:3100"
    <%- endif %>
    volumes:
      - << volume_data_name or ((service_name | default('loki', true)) ~ "_data") >>:/loki:rw
      - ./config/config.yaml:/etc/loki/config.yaml:ro
    <%- if traefik_enabled %>
    networks:
      << traefik_network >>:
    <%- endif %>
    <%- if traefik_enabled %>
    labels:
      - traefik.enable=true
      - traefik.docker.network=<< traefik_network >>
      - traefik.http.services.<< (service_name | default('loki', true)) >>_web.loadBalancer.server.port=3100
      - traefik.http.routers.<< (service_name | default('loki', true)) >>_http.service=<< (service_name | default('loki', true)) >>_web
      - traefik.http.routers.<< (service_name | default('loki', true)) >>_http.rule=Host(`<< traefik_host >>.<< traefik_domain >>`)
      - traefik.http.routers.<< (service_name | default('loki', true)) >>_http.entrypoints=<< traefik_entrypoint >>
      <%- if traefik_tls_enabled %>
      - traefik.http.routers.<< (service_name | default('loki', true)) >>_https.service=<< (service_name | default('loki', true)) >>_web
      - traefik.http.routers.<< (service_name | default('loki', true)) >>_https.rule=Host(`<< traefik_host >>.<< traefik_domain >>`)
      - traefik.http.routers.<< (service_name | default('loki', true)) >>_https.entrypoints=<< traefik_tls_entrypoint >>
      - traefik.http.routers.<< (service_name | default('loki', true)) >>_https.tls=true
      - traefik.http.routers.<< (service_name | default('loki', true)) >>_https.tls.certresolver=<< traefik_tls_certresolver >>
      <%- endif %>
    <%- endif %>

volumes:
  << volume_data_name or ((service_name | default('loki', true)) ~ "_data") >>:
    driver: local

<%- if traefik_enabled %>
networks:
  << traefik_network >>:
    external: true
<%- endif %>
