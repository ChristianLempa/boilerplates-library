---
services:
  << (service_name | default('dockge', true)) >>:
    image: docker.io/louislam/dockge:1.5.0
    restart: << restart_policy >>
    environment:
      - TZ=<< container_timezone >>
      - DOCKGE_STACKS_DIR=<< stacks_path >>
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - << ((volume_data_name | default('', true) | string | trim) if ((volume_data_name | default('', true) | string | trim) and ((volume_data_name | default('', true) | string | trim) | lower) not in ['true', 'false', 'none', 'null']) else ((service_name | default('dockge', true)) ~ "_data")) >>:/app/data
      - << stacks_path >>:<< stacks_path >>
    <%- if traefik_enabled %>
    networks:
      - << traefik_network >>
    <%- endif %>
    <%- if not traefik_enabled %>
    ports:
      - "<< ports_http >>:5001"
    <%- endif %>
    <%- if traefik_enabled %>
    labels:
      - traefik.enable=true
      - traefik.docker.network=<< traefik_network >>
      - traefik.http.services.<< (service_name | default('dockge', true)) >>-web.loadBalancer.server.port=5001
      - traefik.http.routers.<< (service_name | default('dockge', true)) >>-http.service=<< (service_name | default('dockge', true)) >>-web
      - traefik.http.routers.<< (service_name | default('dockge', true)) >>-http.rule=Host(`<< traefik_host >>.<< traefik_domain >>`)
      - traefik.http.routers.<< (service_name | default('dockge', true)) >>-http.entrypoints=<< traefik_entrypoint >>
      <%- if traefik_tls_enabled %>
      - traefik.http.routers.<< (service_name | default('dockge', true)) >>-https.service=<< (service_name | default('dockge', true)) >>-web
      - traefik.http.routers.<< (service_name | default('dockge', true)) >>-https.rule=Host(`<< traefik_host >>.<< traefik_domain >>`)
      - traefik.http.routers.<< (service_name | default('dockge', true)) >>-https.entrypoints=<< traefik_tls_entrypoint >>
      - traefik.http.routers.<< (service_name | default('dockge', true)) >>-https.tls=true
      - traefik.http.routers.<< (service_name | default('dockge', true)) >>-https.tls.certresolver=<< traefik_tls_certresolver >>
      <%- endif %>
    <%- endif %>


volumes:
  << ((volume_data_name | default('', true) | string | trim) if ((volume_data_name | default('', true) | string | trim) and ((volume_data_name | default('', true) | string | trim) | lower) not in ['true', 'false', 'none', 'null']) else ((service_name | default('dockge', true)) ~ "_data")) >>:
    driver: local

<%- if traefik_enabled %>
networks:
  << traefik_network >>:
    external: true
<%- endif %>
