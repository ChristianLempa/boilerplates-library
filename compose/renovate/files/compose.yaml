---
services:
  << (service_name | default('renovate', true)) >>:
    image: ghcr.io/mend/renovate-ce:14.5.0-full
    container_name: << container_name >>
    restart: << restart_policy >>
    hostname: << container_hostname >>
    <%- if traefik_enabled %>
    networks:
      << traefik_network >>:
    <%- endif %>
    <%- if not traefik_enabled %>
    ports:
      - "<< ports_http >>:8080"
    <%- endif %>
    environment:
      - MEND_RNV_ACCEPT_TOS=y
      - MEND_RNV_LICENSE_KEY=${MEND_RNV_LICENSE_KEY}
      - MEND_RNV_PLATFORM=<< renovate_platform >>
      - MEND_RNV_ENDPOINT=<< renovate_endpoint >>
      - MEND_RNV_GITLAB_PAT=${MEND_RNV_GITLAB_PAT}
      - MEND_RNV_WEBHOOK_SECRET=${MEND_RNV_WEBHOOK_SECRET}
      - MEND_RNV_SERVER_PORT=8080
      - RENOVATE_AUTODISCOVER=<< renovate_autodiscover | lower >>
      <%- if container_timezone %>
      - TZ=<< container_timezone >>
      <%- endif %>
      <%- if container_loglevel %>
      - LOG_LEVEL=<< container_loglevel >>
      <%- endif %>
    <%- if traefik_enabled %>
    labels:
      - traefik.enable=true
      - traefik.docker.network=<< traefik_network >>
      - traefik.http.services.<< (service_name | default('renovate', true)) >>.loadbalancer.server.port=8080
      - traefik.http.routers.<< (service_name | default('renovate', true)) >>-http.rule=Host(`<< traefik_host >>.<< traefik_domain >>`)
      - traefik.http.routers.<< (service_name | default('renovate', true)) >>-http.entrypoints=<< traefik_entrypoint >>
      <%- if traefik_tls_enabled %>
      - traefik.http.routers.<< (service_name | default('renovate', true)) >>-https.rule=Host(`<< traefik_host >>.<< traefik_domain >>`)
      - traefik.http.routers.<< (service_name | default('renovate', true)) >>-https.entrypoints=<< traefik_tls_entrypoint >>
      - traefik.http.routers.<< (service_name | default('renovate', true)) >>-https.tls=true
      - traefik.http.routers.<< (service_name | default('renovate', true)) >>-https.tls.certresolver=<< traefik_tls_certresolver >>
      <%- endif %>
    <%- endif %>
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

<%- if traefik_enabled %>
networks:
  << traefik_network >>:
    external: true
<%- endif %>
