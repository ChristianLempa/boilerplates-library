---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: << resource_name >>
spec:
  acme:
    email: << acme_email >>
    server: << acme_server >>
    privateKeySecretRef:
      name: << account_secret_name >>
    solvers:
<%- if solver_type == 'cloudflare-dns01' %>
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: << cloudflare_api_token_secret_name >>
              key: << cloudflare_api_token_secret_key >>
        <%- if dns_zones %>
        selector:
          dnsZones:
          <%- for zone in dns_zones.split(',') %>
            - << zone.strip() >>
          <%- endfor %>
        <%- endif %>
<%- else %>
      - http01:
          ingress:
            ingressClassName: << http01_ingress_class >>
<%- endif %>
