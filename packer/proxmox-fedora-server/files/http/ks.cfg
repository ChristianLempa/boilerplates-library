text
lang << locale >>
keyboard --xlayouts=<< keyboard_layout >>
timezone << timezone >> --utc
rootpw --lock
user --name=<< admin_username >> --groups=wheel --plaintext --password=<< ssh_password >>
reboot
cdrom
bootloader --location=mbr
clearpart --all --initlabel
autopart
%packages
@^server-product-environment
qemu-guest-agent
sudo
vim
cloud-init
%end
